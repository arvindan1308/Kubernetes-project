name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
    paths:
      - '**.js'
      - '**.py'
      - '**.yaml'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build Order Service (Node.js)
      - name: Build Order Service
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/order-service:${{ github.sha }} -f Dockerfile.order .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/order-service:${{ github.sha }}

      # Build Product API (Python)
      - name: Build Product API
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/product-api:${{ github.sha }} -f Dockerfile .
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/product-api:${{ github.sha }}

      # Update Manifests (This triggers Argo CD)
      - name: Update YAML manifests
        run: |
          sed -i "s|image: order-service:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/order-service:${{ github.sha }}|g" app-deployment.yaml
          sed -i "s|image: product-api:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/product-api:${{ github.sha }}|g" app-deployment.yaml
          
      - name: Commit and Push Manifest Changes
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add app-deployment.yaml
          git commit -m "Deploying image tag ${{ github.sha }}"
          git push
